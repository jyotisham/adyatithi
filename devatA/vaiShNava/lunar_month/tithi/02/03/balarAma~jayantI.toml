tags = [ "Dashavataram", "LessCommonFestivals",]
jsonClass = "HinduCalendarEvent"
shlokas = """
वैशाख शुक्लपक्षे तृतीयायां हलायुधः।
सङ्कर्षणो बलो जज्ञे रामः कृष्णाग्रजो हरिः॥
अवतारदिने पुण्ये हरिमुद्दिश्य भक्तितः।
उपवासादि यत् किञ्चित्तदानन्त्याय कल्पते॥
—स्मृतिमुक्ताफलम्
व्रतनिर्णयकल्पवल्ली---
इयमेव बलरामजयन्ती। सा मध्याह्नव्यापिनी ग्राह्या। तथा चोक्तं स्कान्दे---
वैशाखे शुक्लपक्षे तु तृतीयायां गुरौ तथा।
रोहिण्यां कर्कटे लग्ने बलरामो भवेद्धरिः॥ इति।
प्रार्थनामन्त्रः—
नमस्ते हलिनां श्रेष्ठ नमस्ते मुसलायुध।
नमस्ते रेवतीकान्त नमस्ते भक्तवत्सल॥
नमस्ते बलिनां श्रेष्ठ नमस्ते धरणीधर।
प्रलम्बघ्न नमस्तेऽस्तु त्राहि मां कृष्णपूर्वज॥
"""
references_primary = [ "Vaidyanatha Dikshitiyam (SVR) p.62",]
references_secondary = [ "VrataNirnayaKalpavalli",]

